<!-- DYNAMIC LOGO + PROJECTS -->
<script>
/* LOGO */
const savedLogo = localStorage.getItem("siteLogo");
if(savedLogo){
  document.getElementById("siteLogo").src = savedLogo;
}

/* PROJECTS */
function loadProjects(){
  const projects = JSON.parse(localStorage.getItem("projects")) || [];
  const grid = document.getElementById("projectGrid");
  grid.innerHTML = "";

  projects.forEach(img=>{
    grid.innerHTML += `
      <img src="${img}"
           class="rounded-3xl shadow-lg w-full h-64 object-cover">`;
  });
}
loadProjects();
</script>

<!-- PRODUCTS -->
<script>
let currentCategory="all";
function filterCategory(cat){currentCategory=cat;loadProducts();}
function loadProducts(){
const products=JSON.parse(localStorage.getItem("products"))||[];
const grid=document.getElementById("productGrid");
grid.innerHTML="";
products.filter(p=>currentCategory==="all"||p.category===currentCategory)
.forEach(p=>{
grid.innerHTML+=`
<div class="bg-white rounded-2xl shadow overflow-hidden">
<img src="${p.image}" class="w-full h-48 object-cover">
<div class="p-4 text-center font-semibold">${p.title}</div>
</div>`;
});
}
loadProducts();
</script>
